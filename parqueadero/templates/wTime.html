<h1>Here you can see the waiting time for each parking entry</h1>

<form method="get">
    <label for="queue">Vehicles in queue:</label>
    <input id="queue" name="queue" type="number" min="0" value="{{ queue_size }}">
    <button type="submit">Calculate</button>
</form>

<p>Vehicles in queue: {{ queue_size }}</p>
<p>Average service time per entry: {{ average_service_minutes }} minutes</p>
<p><strong>Estimated waiting time: {{ waiting_minutes }} minutes</strong></p>
