<!DOCTYPE html>
<html>
<head>
    <title>Flowgate Recommendations</title>
    <style>
        body { font-family: Arial; text-align: center; background-color: #f4f4f4; }
        button, .link-btn { padding: 10px 20px; margin: 10px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; text-decoration: none; display: inline-block; }
        .card { background: white; padding: 20px; margin: 20px auto; width: 300px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        .link-btn { background-color: #1976d2; color: #fff; }
    </style>
</head>
<body>

<h1>Flowgate Entrance Status</h1>

<button onclick="showEntrance('25')">gate 25</button>
<button onclick="showEntrance('24')">gate 24</button>
<a class="link-btn" href="javascript:history.back()">go back</a>

<div id="info25" class="card" style="display:none">
    <h2>gate 25</h2>
    <p>Cars in queue: {{ entrance_25 }}</p>
    <p>Estimated waiting time: {{ time_25 }} minutes</p>
    <input type="range" min="0" max="60" value="{{ time_25 }}" disabled>
</div>

<div id="info24" class="card" style="display:none">
    <h2>gate 24</h2>
    <p>Cars in queue: {{ entrance_24 }}</p>
    <p>Estimated waiting time: {{ time_24 }} minutes</p>
    <input type="range" min="0" max="60" value="{{ time_24 }}" disabled>
</div>

<div class="card">
    <h3>Weather: {{ weather }}</h3>
    <h3>Traffic level: {{ congestion }}</h3>
    <p>{{ recommendation }}</p>
</div>

<script>
function showEntrance(entrance){
    document.getElementById("info25").style.display="none";
    document.getElementById("info24").style.display="none";

    if(entrance=="25"){
        document.getElementById("info25").style.display="block";
    }

    if(entrance=="24"){
        document.getElementById("info24").style.display="block";
    }
}
</script>

</body>
</html>
